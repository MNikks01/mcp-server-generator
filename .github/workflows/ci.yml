name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  engine:
    name: engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run engine tests
        working-directory: mcpforge
        run: node scripts/test-specs.ts
  web:
    name: web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install
        working-directory: web
        run: npm install --no-audit --no-fund
      - name: Build
        working-directory: web
        run: npm run build
      - name: Web unit tests
        working-directory: web
        run: node scripts/test-plan.ts
