name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    name: typecheck + unit + integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install dev tooling
        run: npm install --no-audit --no-fund
      - name: Test (typecheck + unit + integration)
        run: npm test
  web:
    name: web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install
        working-directory: web
        run: npm install --no-audit --no-fund
      - name: Component tests (vitest + Testing Library)
        working-directory: web
        run: npm run test:unit
      - name: Build
        working-directory: web
        run: npm run build
      - name: Web unit tests
        working-directory: web
        run: node scripts/test-plan.ts
  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install
        working-directory: web
        run: npm install --no-audit --no-fund
      - name: Install browser
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Build
        working-directory: web
        run: npm run build
      - name: E2E
        working-directory: web
        run: npm run test:e2e
